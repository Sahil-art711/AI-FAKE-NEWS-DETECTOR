{# admin_edit.html — Edit Event Page #}
{% extends "base.html" %}
{% block title %}Edit Event{% endblock %}

{% block content %}
<section class="section">
  <div class="container container-narrow">
    <div class="form-card">
      <h2 class="form-title"><i class="fa-solid fa-pen-to-square"></i> Edit Event</h2>

      <form method="POST" action="{{ url_for('admin_edit', eid=event.id) }}">
        <div class="form-row">
          <div class="form-group">
            <label>Event Name *</label>
            <input type="text" name="name" value="{{ event.name }}" required />
          </div>
          <div class="form-group">
            <label>Category</label>
            <input type="text" name="category" value="{{ event.category }}" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date *</label>
            <input type="date" name="date" value="{{ event.date }}" required />
          </div>
          <div class="form-group">
            <label>Time *</label>
            <input type="text" name="time" value="{{ event.time }}" required />
          </div>
        </div>
        <div class="form-group">
          <label>Venue *</label>
          <input type="text" name="venue" value="{{ event.venue }}" required />
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" rows="3">{{ event.description }}</textarea>
        </div>
        <div class="form-group">
          <label>Image URL</label>
          <input type="url" name="image_url" value="{{ event.image_url }}" />
        </div>
        <div style="display:flex; gap:1rem; flex-wrap:wrap;">
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save Changes</button>
          <a href="{{ url_for('admin') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
