{# admin_login.html — Admin Login Page #}
{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block content %}
<section class="section">
  <div class="container container-narrow">
    <div class="form-card">
      <div class="login-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <h2 class="form-title">Admin Login</h2>
      <p class="form-subtitle">Access is restricted to authorized administrators only.</p>

      <form method="POST" action="{{ url_for('admin_login') }}">
        <div class="form-group">
          <label for="username"><i class="fa-solid fa-user-shield"></i> Username</label>
          <input type="text" id="username" name="username" placeholder="admin" required />
        </div>
        <div class="form-group">
          <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fa-solid fa-right-to-bracket"></i> Login
        </button>
      </form>
      <p class="login-hint">Demo credentials: <code>admin</code> / <code>admin123</code></p>
    </div>
  </div>
</section>
{% endblock %}
