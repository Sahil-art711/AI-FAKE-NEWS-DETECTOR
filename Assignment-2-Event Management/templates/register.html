{# register.html — Event Registration Form #}
{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}

<section class="page-hero">
  <div class="container">
    <h1><i class="fa-solid fa-ticket"></i> Event Registration</h1>
    <p>Fill in your details below to secure your spot at an upcoming event.</p>
  </div>
</section>

<section class="section">
  <div class="container container-narrow">
    <div class="form-card">
      <h2 class="form-title">Registration Form</h2>

      <form id="registrationForm" method="POST" action="{{ url_for('register') }}" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <label for="name"><i class="fa-solid fa-user"></i> Full Name <span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" />
          <span class="field-error" id="nameError"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email"><i class="fa-solid fa-envelope"></i> Email Address <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="yourname@example.com" />
          <span class="field-error" id="emailError"></span>
        </div>

        <!-- Phone -->
        <div class="form-group">
          <label for="phone"><i class="fa-solid fa-phone"></i> Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number" maxlength="10" />
          <span class="field-error" id="phoneError"></span>
        </div>

        <!-- Event Selection -->
        <div class="form-group">
          <label for="event_id"><i class="fa-solid fa-calendar-check"></i> Select Event <span class="required">*</span></label>
          <select id="event_id" name="event_id">
            <option value="">-- Choose an Event --</option>
            {% for event in events %}
            <option value="{{ event.id }}"
              {% if prefill_id and prefill_id | int == event.id %}selected{% endif %}>
              {{ event.name }} ({{ event.date }})
            </option>
            {% endfor %}
          </select>
          <span class="field-error" id="eventError"></span>
        </div>

        <!-- Number of Tickets -->
        <div class="form-group">
          <label for="tickets"><i class="fa-solid fa-ticket"></i> Number of Tickets <span class="required">*</span></label>
          <input type="number" id="tickets" name="tickets" min="1" max="10" value="1" />
          <span class="field-error" id="ticketsError"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          <i class="fa-solid fa-paper-plane"></i> Confirm Registration
        </button>

      </form>
    </div>
  </div>
</section>

{% endblock %}
